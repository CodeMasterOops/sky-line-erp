services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: pos-saas-app:latest
    environment:
      AUTORUN_ENABLED: "true"
      AUTORUN_LARAVEL_MIGRATION_ISOLATION: "false"
      AUTORUN_LARAVEL_OPTIMIZE: "false"
      APP_ENV: production
      APP_DEBUG: "false"
      APP_URL: "${APP_URL}"
      ASSET_URL: "${APP_URL}"
      APP_KEY: "${APP_KEY}"
      DB_CONNECTION: mysql
      DB_HOST: "${DB_HOST}"
      DB_PORT: "3306"
      DB_DATABASE: "${DB_DATABASE}"
      DB_USERNAME: "${DB_USERNAME}"
      DB_PASSWORD: "${DB_PASSWORD}"
      SESSION_DRIVER: database
      SESSION_LIFETIME: "120"
      QUEUE_CONNECTION: database
      CACHE_STORE: database
      FILESYSTEM_DISK: public
      LOG_CHANNEL: stderr
      LOG_LEVEL: warning
      MAIL_MAILER: "${MAIL_MAILER:-log}"
      MAIL_HOST: "${MAIL_HOST:-}"
      MAIL_PORT: "${MAIL_PORT:-587}"
      MAIL_USERNAME: "${MAIL_USERNAME:-}"
      MAIL_PASSWORD: "${MAIL_PASSWORD:-}"
      MAIL_FROM_ADDRESS: "${MAIL_FROM_ADDRESS:-}"
      MAIL_FROM_NAME: "${APP_NAME:-POS}"
      VITE_APP_NAME: "${APP_NAME:-POS}"
    volumes:
      - storage_data:/var/www/html/storage/app
    networks:
      - coolify

  scheduler:
    image: pos-saas-app:latest
    command: ["php", "/var/www/html/artisan", "schedule:work"]
    environment:
      APP_ENV: production
      APP_KEY: "${APP_KEY}"
      APP_URL: "${APP_URL}"
      DB_CONNECTION: mysql
      DB_HOST: "${DB_HOST}"
      DB_PORT: "3306"
      DB_DATABASE: "${DB_DATABASE}"
      DB_USERNAME: "${DB_USERNAME}"
      DB_PASSWORD: "${DB_PASSWORD}"
      QUEUE_CONNECTION: database
      CACHE_STORE: database
      FILESYSTEM_DISK: public
      LOG_CHANNEL: stderr
    volumes:
      - storage_data:/var/www/html/storage/app
    networks:
      - coolify
    depends_on:
      - app

  worker:
    image: pos-saas-app:latest
    command:
      [
        "php",
        "/var/www/html/artisan",
        "queue:work",
        "--sleep=3",
        "--tries=3",
        "--max-time=3600",
      ]
    environment:
      APP_ENV: production
      APP_KEY: "${APP_KEY}"
      APP_URL: "${APP_URL}"
      DB_CONNECTION: mysql
      DB_HOST: "${DB_HOST}"
      DB_PORT: "3306"
      DB_DATABASE: "${DB_DATABASE}"
      DB_USERNAME: "${DB_USERNAME}"
      DB_PASSWORD: "${DB_PASSWORD}"
      QUEUE_CONNECTION: database
      CACHE_STORE: database
      FILESYSTEM_DISK: public
      LOG_CHANNEL: stderr
    volumes:
      - storage_data:/var/www/html/storage/app
    networks:
      - coolify
    depends_on:
      - app

volumes:
  storage_data:

networks:
  coolify:
    external: true
